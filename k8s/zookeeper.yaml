apiVersion: v1
kind: Service
metadata:
  name: social-media-zookeeper
spec:
  selector:
    app: social-media-zookeeper
  ports:
    - name: client
      port: 2181
      targetPort: 2181
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-media-zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-media-zookeeper
  template:
    metadata:
      labels:
        app: social-media-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.11
          ports:
            - containerPort: 2181
              name: client
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          readinessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 10
            periodSeconds: 10
