apiVersion: v1
kind: Service
metadata:
  name: social-media-kibana
spec:
  selector:
    app: social-media-kibana
  ports:
    - name: http
      port: 5601
      targetPort: 5601
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-media-kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-media-kibana
  template:
    metadata:
      labels:
        app: social-media-kibana
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.16.0
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://social-media-elasticsearch:9200
